<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingoBeats Intro</title>
  <style>
    :root {
      --bg: #fbf7f2;
      --surface: #ffffff;
      --surface-soft: #fffaf5;
      --text: #1f2428;
      --muted: #6b7280;
      --line: #e7ddd3;
      --accent: #d84f35;
      --shadow: 0 18px 45px rgba(66, 46, 30, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(216, 79, 53, 0.12), transparent 34rem),
        linear-gradient(135deg, var(--bg) 0%, #f5efe8 52%, #f8f4ee 100%);
    }

    .topbar {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 24px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.55rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .brand p {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 16px;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.76);
      font-size: 0.92rem;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(66, 46, 30, 0.08);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(216, 79, 53, 0.42);
      background: var(--surface);
      box-shadow: 0 12px 26px rgba(66, 46, 30, 0.13);
    }

    .btn:focus-visible {
      outline: 3px solid rgba(216, 79, 53, 0.26);
      outline-offset: 3px;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 24px 28px;
    }

    .viewer-shell {
      overflow: hidden;
      border: 1px solid rgba(231, 221, 211, 0.92);
      border-radius: 20px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .viewer-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .viewer-dots {
      display: flex;
      gap: 7px;
      flex: 0 0 auto;
    }

    .viewer-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }

    .viewer-dots span:nth-child(2) {
      background: #f2b84b;
    }

    .viewer-dots span:nth-child(3) {
      background: #4b9b73;
    }

    .viewer-title {
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer {
      width: 100%;
      height: min(78vh, 860px);
      min-height: 560px;
      border: none;
      display: block;
      background: #f5f5f5;
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
        padding: 20px 18px 16px;
      }

      .actions {
        justify-content: stretch;
      }

      .btn {
        flex: 1 1 150px;
      }

      main {
        padding: 0 12px 16px;
      }

      .viewer-shell {
        border-radius: 14px;
      }

      .viewer-header {
        padding: 11px 13px;
      }

      .viewer {
        height: calc(100vh - 210px);
        min-height: 420px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>LingoBeats</h1>
      <p>AI-generated language-learning materials transformed from songs.</p>
    </div>
    <nav class="actions" aria-label="Document links">
      <a class="btn" href="https://github.com/ycsarahli/LingoBeats" target="_blank" rel="noopener noreferrer">
        GitHub Repo
      </a>
    </nav>
  </header>

  <main>
    <section class="viewer-shell" aria-label="LingoBeats PDF preview">
      <div class="viewer-header">
        <div class="viewer-dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="viewer-title">LingoBeats.pdf</div>
      </div>
      <iframe class="viewer" src="app/presentation/public/LingoBeats.pdf" title="LingoBeats PDF"></iframe>
    </section>
  </main>
</body>
</html>
